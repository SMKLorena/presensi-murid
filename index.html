
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi SMK Muhammadiyah 2 Wates</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Latar belakang biru muda gradasi putih */
            background: linear-gradient(to bottom, #a8c0ff, #f2f5fa, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            color: #1a365d;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #2b6cb0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .input-area {
            margin-top: 20px;
            border-top: 2px solid #e2e8f0;
            padding-top: 25px;
        }

        .section-title {
            font-size: 16px;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* Gaya Tombol Presensi */
        .btn-presensi {
            background-color: #3182ce;
            color: white;
        }

        .btn-presensi:hover {
            background-color: #2b6cb0;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(49, 130, 206, 0.3);
        }

        /* Gaya Tombol Rekap */
        .btn-rekap {
            background-color: #38a169;
            color: white;
        }

        .btn-rekap:hover {
            background-color: #2f855a;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(56, 161, 105, 0.3);
        }

        /* Responsif untuk HP / Layar Kecil */
        @media (max-width: 500px) {
            .button-group {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 18px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo di bagian tengah atas -->
        <img src="https://iili.io/BsmClaV.png" alt="Logo SMK Muhammadiyah 2 Wates" class="logo">
        
        <!-- Judul -->
        <h1>PRESENSI MURID SMK MUHAMMADIYAH 2 WATES</h1>
        <div class="subtitle">TAHUN PELAJARAN 2026 - 2027</div>

        <!-- AREA INPUT (BAGIAN BAWAH) -->
        <div class="input-area">
            
            <!-- Pilihan Kelas / Formulir -->
            <div class="section-title">📌 ISI PRESENSI KELAS:</div>
            <div class="button-group">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSf79_8x2v01QqgN9u38GnWxy_TMffKmSbEkUL6MXu2_KrmtvQ/viewform?usp=sharing&ouid=115477988271737922688" target="_blank" class="btn btn-presensi">KELAS 10</a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSfFiE2-ySbtmUn7tDbT5Cd4Sj8dDDq-EWSkwdktVgYEg99lIQ/viewform?usp=sharing&ouid=115477988271737922688" target="_blank" class="btn btn-presensi">KELAS 11</a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSdnR8haMnmzn3HKJCehzzOsGRYWt7Zyme0U91UqhjXIsUVtmA/viewform?usp=sharing&ouid=115477988271737922688" target="_blank" class="btn btn-presensi">KELAS 12</a>
            </div>

            <!-- Tombol Rekap Data -->
            <div class="section-title">📊 LIHAT REKAP PRESENSI:</div>
            <div class="button-group">
                <a href="https://docs.google.com/spreadsheets/d/1v36mcAkiVtioKQ6B9hcrruYIxrRNiV0ohTgzBec_ypE/edit?usp=sharing" target="_blank" class="btn btn-rekap">REKAP KELAS 10</a>
                <a href="https://docs.google.com/spreadsheets/d/1YnJHKlZjft4YIoNkBKxZmJFVnjsbvoA8HAGRoPKM5rc/edit?usp=sharing" target="_blank" class="btn btn-rekap">REKAP KELAS 11</a>
                <a href="https://docs.google.com/spreadsheets/d/1vXjvQhRQ1LORPNZpgKD5dHtnQB_G7PANNzgkpN9yK1w/edit?usp=sharing" target="_blank" class="btn btn-rekap">REKAP KELAS 12</a>
            </div>

        </div>
    </div>

</body>
</html>
